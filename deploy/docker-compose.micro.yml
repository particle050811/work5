version: "3.9"

x-service-common: &service-common
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    ETCD_ENDPOINTS: etcd:2379
    REDIS_ADDR: host.docker.internal:${HOST_REDIS_PORT:-6379}
    REDIS_PASSWORD: ""
    REDIS_DB: "0"
    JWT_SECRET: ${JWT_SECRET:-fanone-microservices-secret-key-2024}
  depends_on:
    etcd:
      condition: service_healthy

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    restart: unless-stopped
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: default=http://etcd:2380
      ETCD_NAME: default
      ETCD_INITIAL_CLUSTER_TOKEN: fanone-etcd
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCDCTL_API: "3"
    command:
      - /usr/local/bin/etcd
    ports:
      - "${ETCD_HOST_PORT:-2379}:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    <<: *service-common
    build:
      context: ..
      dockerfile: services/user/Dockerfile
      network: host
    image: fanone/user-service:local
    environment:
      ETCD_ENDPOINTS: etcd:2379
      REDIS_ADDR: host.docker.internal:${HOST_REDIS_PORT:-6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET:-fanone-microservices-secret-key-2024}
      USER_RPC_ADDR: 0.0.0.0:9001
      USER_DB_DSN: root:${MYSQL_ROOT_PASSWORD:-hsr123456}@tcp(host.docker.internal:${HOST_MYSQL_PORT:-3306})/fanone_user?charset=utf8mb4&parseTime=True&loc=Local

  video-service:
    <<: *service-common
    build:
      context: ..
      dockerfile: services/video/Dockerfile
      network: host
    image: fanone/video-service:local
    environment:
      ETCD_ENDPOINTS: etcd:2379
      REDIS_ADDR: host.docker.internal:${HOST_REDIS_PORT:-6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET:-fanone-microservices-secret-key-2024}
      VIDEO_RPC_ADDR: 0.0.0.0:9002
      VIDEO_DB_DSN: root:${MYSQL_ROOT_PASSWORD:-hsr123456}@tcp(host.docker.internal:${HOST_MYSQL_PORT:-3306})/fanone_video?charset=utf8mb4&parseTime=True&loc=Local

  interaction-service:
    <<: *service-common
    build:
      context: ..
      dockerfile: services/interaction/Dockerfile
      network: host
    image: fanone/interaction-service:local
    environment:
      ETCD_ENDPOINTS: etcd:2379
      REDIS_ADDR: host.docker.internal:${HOST_REDIS_PORT:-6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET:-fanone-microservices-secret-key-2024}
      INTERACTION_RPC_ADDR: 0.0.0.0:9003
      INTERACTION_DB_DSN: root:${MYSQL_ROOT_PASSWORD:-hsr123456}@tcp(host.docker.internal:${HOST_MYSQL_PORT:-3306})/fanone_interaction?charset=utf8mb4&parseTime=True&loc=Local

  chat-service:
    <<: *service-common
    build:
      context: ..
      dockerfile: services/chat/Dockerfile
      network: host
    image: fanone/chat-service:local
    environment:
      ETCD_ENDPOINTS: etcd:2379
      REDIS_ADDR: host.docker.internal:${HOST_REDIS_PORT:-6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET:-fanone-microservices-secret-key-2024}
      CHAT_RPC_ADDR: 0.0.0.0:9004
      CHAT_HTTP_ADDR: :8889
    ports:
      - "${CHAT_HTTP_PORT:-8889}:8889"

  gateway:
    <<: *service-common
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
      network: host
    image: fanone/gateway:local
    environment:
      ETCD_ENDPOINTS: etcd:2379
      REDIS_ADDR: host.docker.internal:${HOST_REDIS_PORT:-6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET:-fanone-microservices-secret-key-2024}
      GATEWAY_HTTP_ADDR: :8888
      STORAGE_ROOT: /app/storage
    ports:
      - "${GATEWAY_HTTP_PORT:-8888}:8888"
    volumes:
      - gateway-storage:/app/storage

volumes:
  gateway-storage:
