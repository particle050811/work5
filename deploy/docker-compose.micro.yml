version: "3.9"

x-go-service: &go-service
  image: golang:1.25
  restart: unless-stopped
  working_dir: /workspace
  volumes:
    - ..:/workspace
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    GOWORK: /workspace/go.work
    GOPROXY: https://proxy.golang.org,direct
    REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
    REDIS_PASSWORD: ""
    REDIS_DB: "0"
    ETCD_ENDPOINTS: etcd:2379
    JWT_SECRET: fanone-microservices-secret-key-2024
    STORAGE_ROOT: /workspace/storage
  depends_on:
    etcd:
      condition: service_healthy

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    restart: unless-stopped
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: default=http://etcd:2380
      ETCD_NAME: default
      ETCD_INITIAL_CLUSTER_TOKEN: fanone-etcd
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCDCTL_API: "3"
    command:
      - /usr/local/bin/etcd
    ports:
      - "${ETCD_HOST_PORT:-2379}:2379"
      - "${ETCD_PEER_HOST_PORT:-2380}:2380"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    <<: *go-service
    working_dir: /workspace/services/user
    command: ["go", "run", "."]
    environment:
      USER_RPC_ADDR: 0.0.0.0:9001
      USER_DB_DSN: ${USER_DB_DSN:-root:hsr123456@tcp(host.docker.internal:3306)/fanone_user?charset=utf8mb4&parseTime=True&loc=Local}
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ETCD_ENDPOINTS: etcd:2379
      JWT_SECRET: fanone-microservices-secret-key-2024
      STORAGE_ROOT: /workspace/storage

  video-service:
    <<: *go-service
    working_dir: /workspace/services/video
    command: ["go", "run", "."]
    environment:
      VIDEO_RPC_ADDR: 0.0.0.0:9002
      VIDEO_DB_DSN: ${VIDEO_DB_DSN:-root:hsr123456@tcp(host.docker.internal:3306)/fanone_video?charset=utf8mb4&parseTime=True&loc=Local}
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ETCD_ENDPOINTS: etcd:2379
      JWT_SECRET: fanone-microservices-secret-key-2024

  interaction-service:
    <<: *go-service
    working_dir: /workspace/services/interaction
    command: ["go", "run", "."]
    environment:
      INTERACTION_RPC_ADDR: 0.0.0.0:9003
      INTERACTION_DB_DSN: ${INTERACTION_DB_DSN:-root:hsr123456@tcp(host.docker.internal:3306)/fanone_interaction?charset=utf8mb4&parseTime=True&loc=Local}
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ETCD_ENDPOINTS: etcd:2379
      JWT_SECRET: fanone-microservices-secret-key-2024

  chat-service:
    <<: *go-service
    working_dir: /workspace/services/chat
    command: ["go", "run", "."]
    environment:
      CHAT_RPC_ADDR: 0.0.0.0:9004
      CHAT_HTTP_ADDR: :8889
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ETCD_ENDPOINTS: etcd:2379
      JWT_SECRET: fanone-microservices-secret-key-2024
    ports:
      - "8889:8889"

  gateway:
    <<: *go-service
    working_dir: /workspace/services/gateway
    command: ["go", "run", "."]
    environment:
      GATEWAY_HTTP_ADDR: :8888
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      ETCD_ENDPOINTS: etcd:2379
      JWT_SECRET: fanone-microservices-secret-key-2024
    ports:
      - "8888:8888"
