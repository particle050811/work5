syntax = "proto3";

package fanone.rpc.video.v1;

option go_package = "example.com/fanone/gen-rpc/kitex_gen/video/v1;videov1";

message Video {
  uint64 id = 1;
  uint64 user_id = 2;
  string video_url = 3;
  string cover_url = 4;
  string title = 5;
  string description = 6;
  int64 visit_count = 7;
  int64 like_count = 8;
  int64 comment_count = 9;
  string created_at = 10;
  string updated_at = 11;
  string deleted_at = 12;
}

message VideoList {
  repeated Video items = 1;
  int64 total = 2;
}

message CreateVideoRequest {
  uint64 user_id = 1;
  string video_url = 2;
  string cover_url = 3;
  string title = 4;
  string description = 5;
}

message CreateVideoResponse {
  Video video = 1;
}

message ListPublishedVideosRequest {
  uint64 user_id = 1;
  int32 page_num = 2;
  int32 page_size = 3;
}

message ListPublishedVideosResponse {
  VideoList data = 1;
}

message SearchVideosRequest {
  string keywords = 1;
  int32 page_num = 2;
  int32 page_size = 3;
  int64 from_date = 4;
  int64 to_date = 5;
  string username = 6;
  string sort_by = 7;
}

message SearchVideosResponse {
  VideoList data = 1;
}

message GetHotVideosRequest {
  int32 page_num = 1;
  int32 page_size = 2;
}

message GetHotVideosResponse {
  VideoList data = 1;
}

message SyncUserRequest {
  uint64 id = 1;
  string username = 2;
  string avatar_url = 3;
}

message SyncUserResponse {}

message SyncVideoCountersRequest {
  uint64 video_id = 1;
  int64 visit_delta = 2;
  int64 like_delta = 3;
  int64 comment_delta = 4;
}

message SyncVideoCountersResponse {}

service VideoService {
  rpc CreateVideo(CreateVideoRequest) returns (CreateVideoResponse);
  rpc ListPublishedVideos(ListPublishedVideosRequest) returns (ListPublishedVideosResponse);
  rpc SearchVideos(SearchVideosRequest) returns (SearchVideosResponse);
  rpc GetHotVideos(GetHotVideosRequest) returns (GetHotVideosResponse);
  rpc SyncUser(SyncUserRequest) returns (SyncUserResponse);
  rpc SyncVideoCounters(SyncVideoCountersRequest) returns (SyncVideoCountersResponse);
}
