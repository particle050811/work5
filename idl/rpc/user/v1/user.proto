syntax = "proto3";

package fanone.rpc.user.v1;

option go_package = "example.com/fanone/gen-rpc/kitex_gen/user/v1;userv1";

message UserProfile {
  uint64 id = 1;
  string username = 2;
  string avatar_url = 3;
  string created_at = 4;
  string updated_at = 5;
  string deleted_at = 6;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message RegisterResponse {
  UserProfile user = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  UserProfile user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message GetUserInfoRequest {
  uint64 user_id = 1;
}

message GetUserInfoResponse {
  UserProfile user = 1;
}

message UpdateAvatarRequest {
  uint64 user_id = 1;
  string avatar_url = 2;
}

message UpdateAvatarResponse {
  UserProfile user = 1;
}

message SyncUserRequest {
  UserProfile user = 1;
}

message SyncUserResponse {}

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
  rpc UpdateAvatar(UpdateAvatarRequest) returns (UpdateAvatarResponse);
  rpc SyncUser(SyncUserRequest) returns (SyncUserResponse);
}
