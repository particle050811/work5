version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
  exclusions:
    generated: strict
    rules:
      - path: ^docs/swagger/(user|video|interaction|relation)/swagger\.go$
        linters:
          - errcheck
          - revive
      - path: ^docs/swagger/swagger\.go$
        linters:
          - errcheck
          - revive
  settings:
    revive:
      rules:
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: var-declaration
        - name: atomic
        - name: bare-return
        - name: struct-tag
        - name: time-naming
