name: Unit Test

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - "test/**"
      - ".github/workflows/unit-test.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - "test/**"
      - ".github/workflows/unit-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            go.work.sum
            gen/rpc/go.sum
            services/chat/go.sum
            services/gateway/go.sum
            services/interaction/go.sum
            services/user/go.sum
            services/video/go.sum
            test/go.sum

      - name: Download dependencies
        run: |
          go work sync
          for mod in . ./gen/rpc ./services/chat ./services/gateway ./services/interaction ./services/user ./services/video ./test; do
            (cd "$mod" && go mod download)
          done

      - name: Run unit tests
        run: |
          for mod in . ./gen/rpc ./services/chat ./services/gateway ./services/interaction ./services/user ./services/video ./test; do
            (cd "$mod" && go test ./...)
          done
