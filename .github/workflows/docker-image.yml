name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - "docs/swagger/**"
      - ".github/workflows/docker-image.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - "docs/swagger/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push commit tag
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: particle050811/fanone-video:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push latest tag after commit tag
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            -t particle050811/fanone-video:latest \
            particle050811/fanone-video@${{ steps.build_image.outputs.digest }}
