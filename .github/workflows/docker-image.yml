name: Build Docker Images

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".dockerignore"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - "docs/swagger/**"
      - ".github/workflows/docker-image.yml"
  pull_request:
    paths:
      - ".dockerignore"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - "docs/swagger/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            image: particle050811/fanone-gateway
            dockerfile: ./services/gateway/Dockerfile
          - service: user-service
            image: particle050811/fanone-user-service
            dockerfile: ./services/user/Dockerfile
          - service: video-service
            image: particle050811/fanone-video-service
            dockerfile: ./services/video/Dockerfile
          - service: interaction-service
            image: particle050811/fanone-interaction-service
            dockerfile: ./services/interaction/Dockerfile
          - service: chat-service
            image: particle050811/fanone-chat-service
            dockerfile: ./services/chat/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push commit tag
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Push latest tag after commit tag
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            -t ${{ matrix.image }}:latest \
            ${{ matrix.image }}@${{ steps.build_image.outputs.digest }}
