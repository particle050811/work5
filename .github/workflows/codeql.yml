name: CodeQL

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - ".github/workflows/codeql.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "go.work"
      - "go.work.sum"
      - "services/**"
      - "gen/**"
      - "pkg/**"
      - "idl/**"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [go]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        env:
          GO111MODULE: on

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
