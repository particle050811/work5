syntax = "proto3";

package fanone.api.video.v1;

option go_package = "video-platform/api/video/v1;v1";

import "api/video/v1/common.proto";
import "api/video/v1/video.proto";

// Comment 用于互动评论列表
// 评论结构支持一级评论（对视频）和二级评论（对评论的回复）
message Comment {
  string id = 1;
  string user_id = 2;          // 评论者 ID
  string video_id = 3;         // 所属视频 ID（评论挂在哪个视频下）
  string parent_id = 4;        // 父评论 ID，为空表示一级评论（直接评论视频）
                               // 不为空表示二级评论（回复某条评论）
                               // 注：本次作业只需实现一级评论，parent_id 可忽略
  int64 like_count = 5;        // 该评论的点赞数
  int64 child_count = 6;       // 子评论数量（二级评论数）
  string content = 7;          // 评论内容
  string created_at = 8;
  string updated_at = 9;
  string deleted_at = 10;      // 软删除标记
}

// CommentListWithTotal 用于分页返回评论
message CommentListWithTotal {
  repeated Comment items = 1;
  int64 total = 2;
}

// LikeActionType 点赞操作类型
enum LikeActionType {
  LIKE_ACTION_TYPE_UNSPECIFIED = 0;
  LIKE_ACTION_TYPE_ADD = 1;    // 点赞
  LIKE_ACTION_TYPE_CANCEL = 2; // 取消点赞
}

// ---------- 互动模块请求/响应 ----------

// VideoLikeActionRequest: 对视频点赞/取消点赞
// 未来扩展评论点赞时，新增 CommentLikeActionRequest 即可
message VideoLikeActionRequest {
  string video_id = 1;
  LikeActionType action_type = 2;
}

message VideoLikeActionResponse {
  BaseResponse base = 1;
}

message ListLikedVideosRequest {
  string user_id = 1;
  PageParams page = 2;
}

message ListLikedVideosResponse {
  BaseResponse base = 1;
  VideoListWithTotal data = 2;  // 包含 items + total，支持分页
}

message PublishCommentRequest {
  string video_id = 1;
  string content = 2;
}

message PublishCommentResponse {
  BaseResponse base = 1;
}

// ListUserCommentsRequest: 获取某用户发表的所有评论
// 查看视频的评论列表请用 video.proto 中的 ListVideoCommentsRequest
message ListUserCommentsRequest {
  string user_id = 1;
  PageParams page = 2;
}

message ListUserCommentsResponse {
  BaseResponse base = 1;
  CommentListWithTotal data = 2;
}

// DeleteCommentRequest: 删除评论
// 只需 comment_id，视频归属信息从数据库获取
// 注意：需校验当前用户是否为评论作者
message DeleteCommentRequest {
  string comment_id = 1;
}

message DeleteCommentResponse {
  BaseResponse base = 1;
}

// ---------- Service 定义 ----------

service InteractionService {
  // 视频点赞（未来扩展：CommentLikeAction）
  rpc VideoLikeAction(VideoLikeActionRequest) returns (VideoLikeActionResponse);
  rpc ListLikedVideos(ListLikedVideosRequest) returns (ListLikedVideosResponse);
  // 评论相关
  rpc PublishComment(PublishCommentRequest) returns (PublishCommentResponse);
  rpc ListUserComments(ListUserCommentsRequest) returns (ListUserCommentsResponse); // 用户的评论列表
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
}
