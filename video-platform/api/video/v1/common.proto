syntax = "proto3";

package fanone.api.video.v1;

option go_package = "video-platform/api/video/v1;v1";

// BaseResponse 表示所有接口共享的返回状态（作业给的接口示例，但是一般不这么写）
message BaseResponse {
  int32 code = 1;
  string msg = 2;
}

// PageParams 统一分页请求参数，page_num 默认为 0
message PageParams {
  int32 page_num = 1;
  int32 page_size = 2;
}
